<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C++ Compiler</title>
    <link rel="icon" href="https://nooracademia-owner.github.io/noor-vault-assets/nooracademia/static/logo/favicon/favicon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" href="https://nooracademia-owner.github.io/noor-vault-assets/nooracademia/static/logo/icon/icon.png">
    <link rel="stylesheet" href="https://nooracademia-owner.github.io/noor-vault-assets/nooracademia/static/fonts.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-loader" class="app-loader">
        <div class="loader-content">
            <div class="spinner"></div>
            <p>Initializing Editor & Compiler...</p>
        </div>
    </div>

    <header>
        <div class="header-wrapper">
            <div class="header-content">
                <div class="logo-group">
                    <img src="https://nooracademia-owner.github.io/noor-vault-assets/nooracademia/static/logo/logo.png" alt="Noor Academia Logo" class="header-logo">
                    <span class="brand-name">NOOR ACADEMIA<sup>IN</sup></span>
                </div>
                <div class="header-divider"></div>
                <h1>Online Compiler</h1>
            </div>
            <nav>
                <button id="menuToggle" class="menu-toggle" aria-label="Toggle menu">
                    <span class="bar"></span><span class="bar"></span><span class="bar"></span>
                </button>
                <ul>
                    <li><a href="https://nooracademia.in/">Home</a></li>
                    <li><a href="https://nooracademia.in/#why-us">Why Us</a></li>
                    <li><a href="https://nooracademia.in/#subjects">Subjects</a></li>
                    <li><a href="https://nooracademia.in/lectures">Lectures</a></li>
                    <li><a href="https://nooracademia.in/#mission">Mission</a></li>
                    <li><a href="https://nooracademia.in/contact">Contact</a></li>
                    <li><a href="https://compiler.nooracademia.in/">Compiler</a></li>
                </ul>
            </nav>
        </div>
    </header>
    <main class="container">
        <div class="editor-container">
            <div class="editor-header">
                <h2>Source Code</h2>
                <div class="editor-controls">
                    <button id="copyCodeBtn" title="Copy Source Code">Copy</button>
                    <button id="settingsBtn" title="Editor Settings">Settings</button>
                    <button id="shareBtn" title="Create a shareable link">Share</button>
                    <button id="downloadBtn" title="Download Code">Download</button>
                    <select id="languageSelector">
                        <option value="cpp">C++</option>
                        <option value="c">C</option>
                    </select>
                </div>
            </div>
            <div id="editor"></div>
        </div>
        <div class="io-container">
            <div class="input-container">
                <h2>Test Case Input</h2>
                <textarea id="stdin-input" spellcheck="false"></textarea>
            </div>
            <div class="action-buttons">
                <button id="runBtn">Run Program</button>
                <button id="killBtn" disabled>Kill</button>
                <button id="clearBtn">Clear</button>
            </div>
            <div class="output-container">
                <div id="spinner" class="spinner-overlay">
                    <div class="spinner"></div>
                </div>
                <div class="output-header">
                    <h2>Output</h2>
                    <button id="copyBtn" title="Copy to Clipboard">Copy</button>
                </div>
                <pre id="output" aria-live="polite"></pre>
            </div>
        </div>
    </main>
    <div id="settingsModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Editor Settings</h2>
                <button id="closeSettingsBtn" class="close-button">&times;</button>
            </div>
            <div class="modal-body">
                <div class="setting-item">
                    <label for="editorThemeSelector">Editor Theme</label>
                    <select id="editorThemeSelector">
                        <option value="vs-dark">Dark</option>
                        <option value="vs">Light</option>
                    </select>
                </div>
                <div class="setting-item">
                    <label for="fontSizeInput">Font Size (px)</label>
                    <input type="number" id="fontSizeInput" min="10" max="24" step="1">
                </div>
            </div>
            <div class="modal-footer">
                <button id="resetSettingsBtn">Reset to Default</button>
            </div>
        </div>
    </div>
    <!-- Monaco Editor Loader -->
    <script src="https://nooracademia-owner.github.io/noor-vault-assets/nooracademia/static/vs/loader.js"></script>
    <script src="main.js"></script>
</body>
</html>
