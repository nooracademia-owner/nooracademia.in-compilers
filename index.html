<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Noor Academia | C Compiler</title>
    <style>
        body { background-color: #1e1e1e; color: #ffffff; font-family: sans-serif; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        header { border-bottom: 2px solid #333; margin-bottom: 20px; }
        
        /* Two-Column Layout */
        .main-layout { display: flex; gap: 20px; }
        .editor-section { flex: 2; }
        .io-section { flex: 1; display: flex; flex-direction: column; gap: 10px; }

        textarea { background: #252526; color: white; font-family: monospace; padding: 10px; border: 1px solid #444; border-radius: 4px; resize: none; }
        #editor { width: 100%; height: 400px; }
        
        /* Input & Output Styles */
        #stdin-input { height: 120px; border-left: 3px solid #4CAF50; color: #00ff00; }
        .terminal { background: black; color: #00ff00; padding: 15px; flex-grow: 1; font-family: monospace; white-space: pre-wrap; border: 1px solid #333; font-size: 13px; }
        
        .controls { margin: 15px 0; }
        #runBtn { background: #4CAF50; color: white; padding: 12px 30px; border: none; cursor: pointer; font-weight: bold; border-radius: 4px; }
        #runBtn:hover { background: #45a049; }
        label { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Noor Academia</h1>
            <p style="color: #888;">Provide your inputs in the green box before running.</p>
        </header>

        <div class="main-layout">
            <div class="editor-section">
                <label>Source Code (C)</label>
                <textarea id="editor" spellcheck="false">#include <stdio.h>

int main() {
    int a, b;
    printf("Enter two numbers: ");
    fflush(stdout);
    scanf("%d %d", &a, &b);
    printf("\nSum: %d + %d = %d\n", a, b, a + b);
    return 0;
}</textarea>
                <div class="controls">
                    <button id="runBtn">Run Program</button>
                </div>
            </div>

            <div class="io-section">
                <label>Test Case Input</label>
                <textarea id="stdin-input" placeholder="Type inputs here (e.g. 10 20)"></textarea>
                
                <label>Program Output</label>
                <div id="output" class="terminal"></div>
            </div>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
